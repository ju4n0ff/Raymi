<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estudio Fotográfico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="raymi.css" />
</head>
<body>
    

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>




  <!-- ===================== NAV ===================== -->
  <nav id="navbar">
    <a class="nav-logo" href="#">
      <div class="logo-mark">✦</div>
      <!-- Reemplaza el div.logo-mark con: <img src="tu-logo.svg" alt="Logo"> -->
      Raymi Fotografía
    </a>
    <ul class="nav-links">
        <li><a href="raymi.html#galeria">Galería</a></li>
      <li><a href="raymi.html#about">Nosotros</a></li>
      <li><a href="raymi.html#packs">Packs</a></li>
  
    </ul>
    <a"></a>
  </nav>





  
 <!-- ===================== CONTACTO ===================== -->
  <section id="contacto">
    <div class="contact-left reveal left">
      <span class="section-tag">Contacto</span>
      <h2 class="section-title">Hablemos de<br><em>tu historia</em></h2>
      <div class="contact-info">
        <div class="contact-row">
          <div class="icon-wrap">📍</div>
          <div>
            <div class="label">Ubicación</div>
            <div class="value">Lima, Perú · Disponible para viajes</div>
          </div>
        </div>
        <div class="contact-row">
          <div  class="icon-wrap"></div>
          <div>
            <div class="label" src="instagram">Instagram</div>
            <a href="https://www.instagram.com/raymi_fotografia/" class="value" target="_blank">@raymi_fotografia</a>
          </div>
        </div>
        <div class="contact-row">
          <div class="icon-wrap">✉️</div>
          <div>
            <div class="label">Email</div>
            <a href="mailto:raymifotografia24@gmail.com" class="value">raymifotografia24@gmail.com</a>
          </div>
        </div>
        <div class="contact-row">
          <div class="icon-wrap">📱</div>
          <div>
            <div class="label">WhatsApp</div>
            <a href="https://w.app/raymi" class="value" target="_blank">+51 952 365 703</a>
          </div>
        </div>
      </div>
    </div>

    <form class="contact-form reveal right" onsubmit="handleSubmit(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Tu nombre completo">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tu@email.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" placeholder="+51 9XX XXX XXX">
        </div>
        <div class="form-group">
          <label>Tipo de servicio</label>
          <select>
            <option value="">Selecciona un pack</option>
            <option>Pack Esencial</option>
            <option>Pack Premium</option>
            <option>Pack Completo</option>
            <option>Pack Expedición</option>
            <option>Pack personalizado</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Cuéntame sobre tu proyecto</label>
        <textarea placeholder="¿Qué tipo de sesión buscas? ¿Tienes una fecha en mente? Cuéntame todo..."></textarea>
      </div>
      <button type="submit" class="form-submit">Enviar mensaje →</button>
    </form>
  </section>
<script src="raymi.js"></script>
</body>
</html>
